[mypy]
# Global settings
python_version = 3.9
warn_return_any = True
warn_unused_configs = True

# Ignore missing type stubs specifically for the 'whisper' module
[mypy-whisper]
ignore_missing_imports = True

# Ignore missing stubs for LangChain-related packages
[mypy-langchain.*]
ignore_missing_imports = True

[mypy-langchain_community.*]
ignore_missing_imports = True